spring.application.name=blood-donation-backend

# ===== Server =====
server.port=8080

# ===== MySQL =====
spring.datasource.url=jdbc:mysql://localhost:3306/blood_donation_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Sh:12:06
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===== JWT =====
app.jwt.secret=BloodDonationSecretKeyForJwtGeneration91051935117
app.jwt.expiration-ms=86400000

# ===== Redis (comment out if not using) =====
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis

# ===== Logging =====
logging.level.com.blooddonation=DEBUG
logging.level.org.springframework.security=DEBUG